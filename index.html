<!DOCTYPE html>
<html lang="zh-CN">
<head>

        }
        .mode-bar {

            justify-content: space-between;

            flex-wrap: wrap;
            background: #ffffff;
            padding: 12px 20px;
            border-bottom: 1px solid #e2edf2;
            gap: 12px;
        }
        .mode-buttons {
            display: flex;

        }
        .mode-btn {
            border: none;
            background: #f0f4f9;

        }

        .wrongonly-btn {
            background: #ffe4e2;
            color: #b91c1c;
        }
        .wrongonly-btn.active {
            background: #b91c1c;
            color: white;
        }

            background: #e9f0f5;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .quiz-card {
            padding: 28px 24px 32px;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .q-type {
            background: #dfe9f3;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .q-num {
            font-size: 0.8rem;
            color: #4a627a;
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 12px 0 20px;
            color: #0a2540;
        }
        .options-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fafcff;
            padding: 10px 16px;
            border-radius: 18px;
            border: 1px solid #e2edf2;
            cursor: pointer;
            transition: 0.1s;
        }
        .option-prefix {
            font-weight: 700;
            min-width: 28px;
            color: #2c5f8a;
        }
        .option-text {
            flex: 1;
        }
        .feedback-area {
            margin: 20px 0 20px;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            border-left: 5px solid;
        }
        .feedback-correct {
            background: #e0f2e9;
            border-left-color: #2b7a4b;
            color: #14532d;
        }
        .feedback-wrong {
            background: #fee9e7;
            border-left-color: #b91c1c;
            color: #a10f0f;
        }
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .nav-btn {
            flex: 1;
            background: white;
            border: 1px solid #cbdde9;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .nav-btn:hover {
            background: #eef3fc;
        }
        .check-btn {
            width: 100%;
            background: #2c5f8a;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 15px;
            cursor: pointer;
        }
        .small-note {
            text-align: center;
            font-size: 0.7rem;
            color: #7c8ea0;
            margin-top: 20px;
        }
        hr {
            margin: 5px 0;
        }
        @media (max-width: 550px) {
            .quiz-card { padding: 20px 16px; }
            .question-text { font-size: 1.1rem; }

    </style>
</head>

            { text:"最有益于老年人的蛋白质食物类别是（", options:["豆类食物","蛋类食物","蔬菜类食物","水果类食物"], ans:"A" },

            { text:"关于食品营养与烹调关系正确的选项是（", options:["通过调配原料使菜品或宴席的营养成分比较全面","通过火候运用使菜品或宴席的营养成分比较全面","烹调无法提高营养素的利用程度","烹调只会破坏营养素，降低菜品的营养价值"], ans:"A" },
            { text:"关于给肉料裹上浆、粉烹调的原理不正确的是（ ）。", options:["大大增加B族维生素","减少营养素与空气接触被氧化","使原料不直接与高温油接触，避免破坏蛋白质和维生素","原料外形美观"], ans:"A" },
            { text:"蔬菜和水果的主要卫生问题包括微生物和寄生虫卵污染，工业废水和生活污水污染，腐败变质和亚硝酸盐以及（ ）。", options:["核辐射污染","农药残留","黄曲霉素污染","抗菌素污染"], ans:"B" },

            { text:"发生食物中毒后，公共营养师要采取的行动包括：（", options:["赶快处理现场，清理和销毁各种物证","及时向当地卫生部门报告","隐藏中毒病人","隐瞒不报"], ans:"B" },
            { text:"《中国食物与营养发展纲要》提出2001～2010年10年优先解决三个重点人群指（ ）。", options:["少年儿童","妇幼","老年人群体","以上选项均正确"], ans:"D" },
            { text:"我国第一部《食品卫生法》开始于（", options:["1990年","1995年","2000年","2005年"], ans:"B" },

            { text:"广东省居民存在的膳食问题是（", options:["营养不良是主要问题","基本解决学龄前儿童低体重问题","食糖消费量偏高","食盐消费量偏高"], ans:"D" },
            { text:"减肥训练者宜采用中低运动强度、持续时间（ ）的有氧运动。", options:["较短","较长","中等","很短"], ans:"B" },
            { text:"使用人参时应注意下面哪一选项（", options:["无虚体实，实证热证者不用","保健补虚，抗衰老，一般每日5-10g","保健补虚时应该坚持每天连服","人参服用剂量不受季节限制"], ans:"A" },

            });
        }
        singleList.forEach((item, idx) => {
            questions.push({
                id: `s${idx+1}`,
                type: 'single',
                text: item.text,
                options: item.options,
                answer: item.ans,
                explanation: `正确答案：${item.ans}`
            });
        });

        // ======================= 多选题（基于原题） =======================
        const multiData = [
            { text:"人体的条件必需氨基酸有（）。", options:["赖氨酸","酪氨酸","半胱氨酸","亮氨酸"], ans: ["B","C"] },
            { text:"影响铁吸收的体内因素有（）。", options:["铁需要量","铁储存量","食物通过肠道的时间","胃酸"], ans: ["A","B","C","D"] },
            { text:"位于谷粒一端的胚芽，含有丰富的（）。", options:["蛋白质","脂类","矿物质","维生素"], ans: ["A","B","C","D"] },
            { text:"我国膳食结构调整的原则，不应（）。", options:["大大增加动物性食物","增加肉类在膳食中的比重","增加谷类在膳食中的比重","坚持以植物性食物为主，调整肉食结构"], ans: ["A","B","C"] },
            { text:"微量元素锌被称为生命之花，它主要来源于（）。", options:["粮谷类","动物肝脏类","蔬菜类","海产品类"], ans: ["B","D"] },
            { text:"（ ）是蛋白质的重要生理功能。", options:["组成人体组织，供给人体生长、更新、修补组织的材料","通过参与酶和激素以维持和调节生理功能，催化代谢","与抗体形成，增强人体抵抗力有关","维持体液平衡，调节机体的渗透压"], ans: ["A","B","C","D"] },
            { text:"（ ）是维生素缺乏的主要原因。", options:["维生素摄入不足","需要量相对增加","由于年龄太小或太大","吸收利用障碍"], ans: ["A","B","D"] },
            { text:"（ ）不能很好地保存鱼肉中的营养成分。", options:["红烧","煎","清蒸","烤"], ans: ["B","D"] },
            { text:"绿色叶菜富含（）。", options:["碳水化合物","胡萝卜素","维生素C","蛋白质"], ans: ["B","C"] },
            { text:"（ ）不利于钙的消化与吸收。", options:["柠檬酸","草酸","单宁","植酸"], ans: ["B","C","D"] },
            { text:"谷类中的B族维生素主要集中在（）。", options:["胚乳","糊粉层","谷皮","胚芽"], ans: ["B","C","D"] }
        ];
        for(let i=0;i<40;i++){
            let m = multiData[i % multiData.length];
            questions.push({
                id: `m${i+1}`,
                type: 'multiple',
                text: m.text,
                options: m.options,
                answer: m.ans,
                explanation: `正确答案：${m.ans.join('、')}`
            });
        }

        // ======================= 判断题（基于原题） =======================
        const judgeData = [
            { text:"玉米蛋白质中第二限制氨基酸为色氨酸。", ans: false },
            { text:"当人体缺乏维生素C时会引起佝偻病。", ans: false },
            { text:"食物成分表列出的食物重量是指食物的可食部。", ans: true },
            { text:"限制性氨基酸都是必需氨基酸。", ans: false },
            { text:"年龄越大，基础代谢率就越高。", ans: false },
            { text:"大豆类几乎不含维生素C。", ans: true },
            { text:"植物性食物中的蛋白质都是不完全蛋白质。", ans: false },
            { text:"成人维生素E的适宜摄入量为14微克/日。", ans: false },
            { text:"酸奶是呈酸性食物。", ans: false },
            { text:"膳食结构是指膳食中各类食物的数量及其在膳食中所占的比重。", ans: true },
            { text:"食物在加热过程中，蛋白质发生变性，有利于人体对蛋白质的消化吸收。", ans: true },
            { text:"地中海膳食结构下，心脑血管疾病发生率最低。", ans: true },
            { text:"评定食物蛋白质营养价值时，应以含量为基础，不能脱离含量考虑其营养价值。", ans: true },
            { text:"动物性食品中的铁主要以血红素形式存在，消化吸收率很高。", ans: true },
            { text:"干眼病是由于缺乏维生素B2。", ans: false },
            { text:"萝卜中含有丰富的β-胡萝卜素。", ans: true },
            { text:"维生素C可以提高机体免疫力。", ans: true },
            { text:"动物性原料中维生素C的含量都较高，因此每天不一定要食用蔬菜水果。", ans: false },
            { text:"加热时间越长，营养素的损失越多，所在最好的烹调方法是旺火快炒。", ans: true },
            { text:"维生素D摄取过多可引起机体中毒。", ans: true },
        ];
        for(let i=0;i<40;i++){
            let j = judgeData[i % judgeData.length];
            questions.push({
                id: `t${i+1}`,
                type: 'judge',
                text: j.text,
                options: ["正确","错误"],
                answer: j.ans ? "正确" : "错误",
                explanation: `正确答案：${j.ans ? "正确" : "错误"}`
            });
        }
        return questions;
    }

    // 全局数据
    const fullQuestions = buildCompleteQuestions();
    let currentMode = "practice";   // practice, recite, wrongOnly
    let currentIdx = 0;
    let wrongSet = new Set();        // 存储错题id
    let lastFeedback = null;         // 存储最后一次反馈
    let currentQuestions = [...fullQuestions];
    
    // 存储与加载
    function saveState() {
        localStorage.setItem("lastIdx", currentIdx);
        localStorage.setItem("lastMode", currentMode);
        localStorage.setItem("wrongIds", JSON.stringify([...wrongSet]));
    }
    function loadState() {
        const savedIdx = localStorage.getItem("lastIdx");
        const savedMode = localStorage.getItem("lastMode");
        const savedWrong = localStorage.getItem("wrongIds");
        if(savedIdx) currentIdx = parseInt(savedIdx) || 0;
        if(savedMode && ["practice","recite","wrongOnly"].includes(savedMode)) currentMode = savedMode;
        if(savedWrong) {
            try {
                const arr = JSON.parse(savedWrong);
                wrongSet = new Set(arr);
            } catch(e) {}
        }
        // 同步错题列表
        if(currentMode === "wrongOnly") {
            const wrongQ = fullQuestions.filter(q => wrongSet.has(q.id));
            if(wrongQ.length === 0) {
                currentMode = "practice";
                currentQuestions = [...fullQuestions];
            } else {
                currentQuestions = [...wrongQ];
            }
        } else {
            currentQuestions = [...fullQuestions];
        }
        if(currentIdx >= currentQuestions.length && currentQuestions.length) currentIdx = currentQuestions.length-1;
        if(currentIdx < 0 && currentQuestions.length) currentIdx = 0;
    }

    // 错题管理
    function addWrong(id) {
        wrongSet.add(id);
        saveState();
    }
    function removeWrong(id) {
        wrongSet.delete(id);
        saveState();
    }
    function updateWrongList() {
        if(currentMode === "wrongOnly") {
            const wrongOnlyList = fullQuestions.filter(q => wrongSet.has(q.id));
            if(wrongOnlyList.length === 0) {
                alert("错题本已清空，自动切换到刷题模式");
                setMode("practice");
                return;
            }
            currentQuestions = [...wrongOnlyList];
            if(currentIdx >= currentQuestions.length) currentIdx = currentQuestions.length-1;
            if(currentIdx < 0 && currentQuestions.length) currentIdx = 0;
            renderUI();
        }
    }

    // 提交答案核对
    function checkAndRecord(selected, q) {
        if(!q) return {correct:false, correctAnswer:""};
        let isCorrect = false;
        let correctShow = "";
        if(q.type === "single") {
            isCorrect = (selected === q.answer);
            correctShow = q.answer;
        } else if(q.type === "multiple") {
            const selectedSet = new Set(selected);
            const correctSet = new Set(q.answer);
            isCorrect = selectedSet.size === correctSet.size && [...selectedSet].every(v => correctSet.has(v));
            correctShow = q.answer.join("、");
        } else {
            isCorrect = (selected === q.answer);
            correctShow = q.answer;
        }
        if(!isCorrect) {
            addWrong(q.id);
        } else {
            if(wrongSet.has(q.id)) removeWrong(q.id);
        }
        return {correct: isCorrect, correctAnswer: correctShow};
    }

    // 渲染界面
    function renderUI() {
        const root = document.getElementById("appRoot");
        if(!root) return;
        if(currentQuestions.length === 0) {
            root.innerHTML = `<div class="quiz-card"><div class="question-text">暂无题目，请切换模式或积累错题</div><button class="nav-btn" onclick="window.setMode('practice')">返回刷题</button></div>`;
            return;
        }
        const q = currentQuestions[currentIdx];
        const isRecite = (currentMode === "recite");
        const modeDisplay = currentMode === "practice" ? "📝 刷题模式" : (currentMode === "recite" ? "📖 背题模式" : "❌ 错题专练");
        
        let html = `<div class="mode-bar">
                        <div class="mode-buttons">
                            <button class="mode-btn ${currentMode === 'practice' ? 'active' : ''}" onclick="window.setMode('practice')">刷题模式</button>
                            <button class="mode-btn ${currentMode === 'recite' ? 'active' : ''}" onclick="window.setMode('recite')">背题模式</button>
                            <button class="mode-btn wrongonly-btn ${currentMode === 'wrongOnly' ? 'active' : ''}" onclick="window.setMode('wrongOnly')">📘 错题本</button>
                        </div>
                        <div class="progress-info">${currentIdx+1} / ${currentQuestions.length}</div>
                    </div>
                    <div class="quiz-card">
                        <div class="question-header">
                            <span class="q-type">${q.type==='single'?'单选题':(q.type==='multiple'?'多选题':'判断题')}</span>
                            <span class="q-num">${q.id}</span>
                        </div>
                        <div class="question-text">${escapeHtml(q.text)}</div>
                        <div class="options-area" id="optionsArea"></div>`;
        if(lastFeedback && !isRecite) {
            const fbClass = lastFeedback.correct ? "feedback-correct" : "feedback-wrong";
            const icon = lastFeedback.correct ? "✅" : "❌";
            html += `<div class="feedback-area ${fbClass}">${icon} ${lastFeedback.correct ? '回答正确！' : '回答错误！'} 正确答案：${lastFeedback.correctAnswer}</div>`;
        } else if(isRecite) {
            let correctAns = "";
            if(q.type === "multiple") correctAns = q.answer.join("、");
            else correctAns = q.answer;
            html += `<div class="feedback-area feedback-correct">📘 背题模式 · 正确答案：${correctAns}</div>`;
        }
        html += `<div class="nav-buttons">
                    <button class="nav-btn" onclick="window.goPrev()">◀ 上一题</button>
                    <button class="nav-btn" onclick="window.goNext()">下一题 ▶</button>
                 </div>`;
        if(!isRecite) {
            html += `<button class="check-btn" id="submitAnswerBtn">✓ 核对答案</button>`;
        }
        html += `<div class="small-note">滑动切换题目 · 错题自动记录</div></div>`;
        root.innerHTML = html;
        
        const optsDiv = document.getElementById("optionsArea");
        if(!optsDiv) return;
        if(q.type === "multiple") {
            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65+idx);
                optsDiv.innerHTML += `<label class="option-item"><input type="checkbox" name="multiOpt" value="${letter}"> <span class="option-prefix">${letter}.</span><span class="option-text">${escapeHtml(opt)}</span></label>`;
            });
        } else if(q.type === "single") {
            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65+idx);
                optsDiv.innerHTML += `<label class="option-item"><input type="radio" name="singleOpt" value="${letter}"> <span class="option-prefix">${letter}.</span><span class="option-text">${escapeHtml(opt)}</span></label>`;
            });
        } else {
            optsDiv.innerHTML = `<label class="option-item"><input type="radio" name="judgeOpt" value="正确"> <span>✅ 正确</span></label>
                                 <label class="option-item"><input type="radio" name="judgeOpt" value="错误"> <span>❌ 错误</span></label>`;
        }
        if(!isRecite) {
            const submitBtn = document.getElementById("submitAnswerBtn");
            if(submitBtn) {
                submitBtn.onclick = () => {
                    let selected = null;
                    if(q.type === "multiple") {
                        const checked = [...document.querySelectorAll('input[name="multiOpt"]:checked')].map(cb => cb.value);
                        if(checked.length === 0) { alert("请至少选择一个选项"); return; }
                        selected = checked;
                    } else if(q.type === "single") {
                        const radio = document.querySelector('input[name="singleOpt"]:checked');
                        if(!radio) { alert("请选择一个选项"); return; }
                        selected = radio.value;
                    } else {
                        const radio = document.querySelector('input[name="judgeOpt"]:checked');
                        if(!radio) { alert("请选择正确或错误"); return; }
                        selected = radio.value;
                    }
                    const result = checkAndRecord(selected, q);
                    lastFeedback = result;
                    renderUI();
                };
            }
        }
    }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function setMode(mode) {
        currentMode = mode;
        if(mode === "wrongOnly") {
            const wrongQ = fullQuestions.filter(q => wrongSet.has(q.id));
            if(wrongQ.length === 0) {
                alert("错题本暂无题目，请先在刷题模式下积累错题。切换至刷题模式");
                currentMode = "practice";
                currentQuestions = [...fullQuestions];
            } else {
                currentQuestions = [...wrongQ];
            }
        } else {
            currentQuestions = [...fullQuestions];
        }
        if(currentIdx >= currentQuestions.length && currentQuestions.length) currentIdx = currentQuestions.length-1;
        if(currentIdx < 0 && currentQuestions.length) currentIdx = 0;
        lastFeedback = null;
        saveState();
        renderUI();
    }
    function goPrev() {
        if(currentQuestions.length === 0) return;
        if(currentIdx > 0) currentIdx--;
        else alert("已是第一题");
        lastFeedback = null;
        saveState();
        renderUI();
    }
    function goNext() {
        if(currentQuestions.length === 0) return;
        if(currentIdx+1 < currentQuestions.length) currentIdx++;
        else alert("已是最后一题");
        lastFeedback = null;
        saveState();
        renderUI();
    }
    window.setMode = setMode;
    window.goPrev = goPrev;
    window.goNext = goNext;
    
    loadState();
    renderUI();
</script>
</body>
</html>
