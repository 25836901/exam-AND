<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>公共营养师三级题库</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #e4e9f0;
            gap: 10px;
        }
        .mode-group {
            display: flex;
            gap: 8px;
        }
        .mode-btn {
            border: none;
            background: #eef2f7;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            color: #1f2a3e;
        }
        .mode-btn.active {
            background: #2c6e9e;
            color: white;
        }
        .wrong-btn {
            background: #ffe4e2;
            color: #b91c1c;
        }
        .wrong-btn.active {
            background: #b91c1c;
            color: white;
        }
        .counter {
            background: #eef2f7;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .card {
            padding: 24px 22px 32px;
        }
        .q-type {
            display: inline-block;
            background: #e2e8f0;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .q-text {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 12px 0 20px;
            color: #0f172a;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .opt {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fafcff;
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid #e2edf2;
            cursor: pointer;
        }
        .opt-prefix {
            font-weight: 700;
            min-width: 28px;
            color: #2c6e9e;
        }
        .feedback {
            margin: 20px 0;
            padding: 12px 18px;
            border-radius: 20px;
            border-left: 5px solid;
        }
        .feedback.correct {
            background: #e0f2e9;
            border-left-color: #15803d;
            color: #14532d;
        }
        .feedback.wrong {
            background: #fee9e7;
            border-left-color: #b91c1c;
            color: #9b1c1c;
        }
        .nav {
            display: flex;
            gap: 15px;
            margin: 20px 0 10px;
        }
        .nav-btn {
            flex: 1;
            background: white;
            border: 1px solid #cbd5e1;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .check-btn {
            width: 100%;
            background: #2c6e9e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
            cursor: pointer;
        }
        .small {
            text-align: center;
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 16px;
        }
        input[type="radio"], input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #2c6e9e;
        }
        @media (max-width: 550px) {
            .card { padding: 18px; }
            .q-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div id="root" class="app"></div>

<script>
    // --------------------------------------------------------------
    // 完整题库：单选题 1-120，每个都有4个选项，答案与原文一致
    // --------------------------------------------------------------
    const singleList = [
        { text:"在市场经济条件下，职业道德具有（ ）的社会功能", opts:["鼓励人们自由选择职业","遏制牟利最大化","促进人们的行为规范化","最大限度地克服人们受利益驱动"], ans:"C" },
        { text:"下列选项中，关于职业道德与人的事业成功的关系的正确论述是（ ）。", opts:["职业道德是事业成功的重要条件","职业道德水平高的人肯定能够取得事业的成功","缺乏职业道德的人也会获得事业的成功","人的事业成功与否与职业道德无关"], ans:"A" },
        { text:"在商业活动中，不符合待人热情要求的是（", opts:["严肃待客，不卑不亢","主动服务，细致周到","微笑大方，不厌其烦","亲切友好，宾至如归"], ans:"A" },
        { text:"关于创新的论述，不正确的说法是（", opts:["创新需要“标新立异”","服务也需要创新","创新是企业进步的灵魂","引进别人的新技术不算创新"], ans:"A" },
        { text:"下列选项中，党参的主要作用不包括（", opts:["抗应激能力","保肾保肝功能","抗溃疡作用，增强胃黏膜的屏障功能","改善贫血，抑制血小板"], ans:"B" },
        { text:"下列选项中，冬虫夏草的主要作用不包括（", opts:["调节免疫功能","抗肿瘤作用","改善心肌缺血与心律失常，降低血压","兴奋中枢神经系统"], ans:"D" },
        { text:"青少年运动员每消耗4.184MJ（1000kcal）能量，维生素的供应量分别为B1（ ）、B2（ ）、烟酸（ ）。", opts:["1mg，1mg，10mg","1mg，10mg，1mg","10mg，1mg，1mg","1mg，1mg，1mg"], ans:"A" },
        { text:"属于肿瘤的外源性致病因素的选项是（", opts:["免疫状态","霉菌毒素","遗传因素","激素水平"], ans:"B" },
        { text:"描述不完全蛋白质正确的选项是（", opts:["氨基酸种类齐全的蛋白质是不完全蛋白质","酪蛋白属于完全蛋白质","胶原蛋白属于不完全蛋白质","大豆蛋白是完全蛋白质"], ans:"B" },
        { text:"描述氨基酸模式不正确的选项是（", opts:["食物蛋白质氨基酸模式与人体蛋白质越接近，各种氨基酸被机体利用的程度越高","食物蛋白质氨基酸模式与人体蛋白质越接近，食物蛋白质的营养价值相对越高","食物蛋白质中限制氨基酸的种类越多，营养价值越高","食物蛋白质中必需氨基酸的种类越多，营养价值越高"], ans:"C" },
        { text:"某一食物蛋白质与鸡蛋比较，精氨酸含量最低，其次是苏氨酸，缬氨酸高于鸡蛋白，赖氨酸及其他氨基酸与鸡蛋白相近，则该食物蛋白的限制氨基酸为（ ）。", opts:["精氨酸","苏氨酸","赖氨酸","缬氨酸"], ans:"A" },
        { text:"描述脂类生理功能不正确的是（", opts:["维持人体正常的生理和发育所必需的物质","构成人体细胞的重要成分","促进脂溶性维生素吸收和利用","人体唯一能量来源"], ans:"D" },
        { text:"缺铁性贫血可导致（", opts:["月经紊乱","骨质软化","呼吸困难","恶心、呕吐"], ans:"A" },
        { text:"描述钾的生理功能错误的选项是（", opts:["参与碳水化合物及蛋白质的合成代谢","维持细胞内正常渗透压","增强神经肌肉的兴奋性","维持细胞内外的酸碱平衡"], ans:"C" },
        { text:"为了满足生长发育的需要，10~13岁儿童摄入量应高于成年人的是（", opts:["铜","碘","铁","钙"], ans:"D" },
        { text:"符合孕早期合理膳食原则的选项是（", opts:["饮食以易消化为宜","避免油腻食物","多选优质蛋白质的食物","以上选项都正确"], ans:"D" },
        { text:"描述母乳与牛乳营养素正确的选项是（", opts:["母乳脂肪含量高于牛乳","母乳蛋白质含量高于牛乳","母乳乳糖含量高于牛乳","母乳维生素含量低于牛乳"], ans:"C" },
        { text:"人工喂养新生儿开始时应（", opts:["1份鲜牛乳加1份水稀释","2份水加1份鲜牛乳稀释","2份鲜牛乳加1份水稀释","4份鲜牛乳加1份水稀释"], ans:"C" },
        { text:"最有益于老年人的蛋白质食物类别是（", opts:["豆类食物","蛋类食物","蔬菜类食物","水果类食物"], ans:"A" },
        { text:"乳母较孕前能量增加量为（ ）。", opts:["200kcal/d","300kcal/d","400kcal/d","500kcal/d"], ans:"D" },
        { text:"描述谷类食物营养特点不正确的选项是（", opts:["谷皮不含淀粉","糊粉层含丰富淀粉","胚乳含大量淀粉和一定量的蛋白质","胚芽含有一定量的脂溶性维生素"], ans:"A" },
        { text:"描述烹调加工过程对畜、禽、鱼类食品营养成分变化不正确的是（ ）。", opts:["烹调后蛋白质量变化不大，更易消化吸收","高温制作过程中B族维生素损失较多","炖、煮肉类时无机盐和脂溶性维生素损失不大","烧烤食物味道鲜美，营养价值增加"], ans:"D" },
        { text:"有关发酵酸奶的营养特点不正确的选项是（", opts:["乳酸菌繁殖提高维生素B12和叶酸的含量","在乳酸作用下酪蛋白凝固产生细小均匀的乳状凝块，易于消化吸收","乳糖不耐受症的人群不宜饮发酵酸奶","发酵酸奶营养价值优于牛乳"], ans:"C" },
        { text:"腌渍与烟熏加工工艺相比，影响营养素最大的区别是（", opts:["烟熏加工工艺易产生苯并芘等致癌物质","不会造成维生素的损失","脂肪变为风味物质","蛋白质容易分解成氨基酸"], ans:"A" },
        { text:"描述常见牛奶加工技术错误的选项是（", opts:["酸奶是以牛乳为主要原料，加入乳酸菌经发酵制得的产品","超高温瞬时灭菌奶指在60~80℃、数分钟杀灭奶中致病菌和腐败菌制得的产品","乳粉将鲜牛奶为主要原料，经杀菌、浓缩、喷雾干燥等工艺制得的粉末状产品","以上选项均错误"], ans:"B" },
        { text:"关于食品营养与烹调关系正确的选项是（", opts:["通过调配原料使菜品或宴席的营养成分比较全面","通过火候运用使菜品或宴席的营养成分比较全面","烹调无法提高营养素的利用程度","烹调只会破坏营养素，降低菜品的营养价值"], ans:"A" },
        { text:"关于给肉料裹上浆、粉烹调的原理不正确的是（ ）。", opts:["大大增加B族维生素","减少营养素与空气接触被氧化","使原料不直接与高温油接触，避免破坏蛋白质和维生素","原料外形美观"], ans:"A" },
        { text:"蔬菜和水果的主要卫生问题包括微生物和寄生虫卵污染，工业废水和生活污水污染，腐败变质和亚硝酸盐以及（ ）。", opts:["核辐射污染","农药残留","黄曲霉素污染","抗菌素污染"], ans:"B" },
        { text:"最常见食品生物性污染是（", opts:["病毒性污染","细菌和细菌毒素性污染","真菌性污染","真菌毒素污染"], ans:"B" },
        { text:"发生食物中毒后，公共营养师要采取的行动包括：（", opts:["赶快处理现场，清理和销毁各种物证","及时向当地卫生部门报告","隐藏中毒病人","隐瞒不报"], ans:"B" },
        { text:"《中国食物与营养发展纲要》提出2001～2010年10年优先解决三个重点人群指（ ）。", opts:["少年儿童","妇幼","老年人群体","以上选项均正确"], ans:"D" },
        { text:"我国第一部《食品卫生法》开始于（", opts:["1990年","1995年","2000年","2005年"], ans:"B" },
        { text:"关于人体缺乏营养的原因不包括（", opts:["可能是食物供给过量造成","可能是食品搭配不均衡造成","可能是营养素吸收利用障碍","可能是营养素丢失增加造成"], ans:"A" },
        { text:"广东省居民存在的膳食问题是（", opts:["营养不良是主要问题","基本解决学龄前儿童低体重问题","食糖消费量偏高","食盐消费量偏高"], ans:"D" },
        { text:"减肥训练者宜采用中低运动强度、持续时间（ ）的有氧运动。", opts:["较短","较长","中等","很短"], ans:"B" },
        { text:"使用人参时应注意下面哪一选项（", opts:["无虚体实，实证热证者不用","保健补虚，抗衰老，一般每日5-10g","保健补虚时应该坚持每天连服","人参服用剂量不受季节限制"], ans:"A" },
        { text:"24小时回顾法膳食调查的优点是（", opts:["准确","应答率高","反映长期的膳食模式","适用于大样本"], ans:"B" },
        { text:"某幼儿园膳食调查前库存大米30kg，调查30天，期间多次零星购买大米240kg，调查结束时剩余大米60kg，调查期间该幼儿园平均每天消耗大米（ ）kg。", opts:["10","7","0","3"], ans:"B" },
        { text:"某成年女性能量需要量1900kcal，正常情况下早餐应供给的能量为（ ）。", opts:["200kcal","600kcal","900kcal","1900kcal"], ans:"B" },
        { text:"人日数是用被调查者一日三餐为标准折合的（ ）。", opts:["用餐人数","用餐人次","用餐天数","标准天数"], ans:"C" },
        { text:"规定餐次比：早餐25%、午餐40%、晚餐35%，某成年男性膳食调查只吃了早餐和晚餐，确定该男性当天的人日数为（ ）。", opts:["0.25","0.4","0.6","0.75"], ans:"C" },
        { text:"按照三餐的餐次比分别为30%、40%、30%，某幼儿园早餐有10名儿童进餐，午餐有20名儿童进餐，晚餐有30名儿童进餐，则总人日数为（ ）。", opts:["10","20","30","60"], ans:"B" },
        { text:"关于“标准人”正确的定义是：（ ）。", opts:["以极轻体力劳动成年女子为标准人","以轻体力劳动成年女子为标准人","以极轻体力劳动成年男子为标准人","以轻体力劳动成年男子为标准人"], ans:"D" },
        { text:"对某人群进行了3天的膳食调查，能量供给量有三种情况：2000kcal有12人，2400kcal有8人，2600kcal有6人。该人群的折合标准人系数为：（ ）。", opts:["0.83","0.94","1.00","1.08"], ans:"B" },
        { text:"中国营养学会2007年制定《中国居民膳食指南》的内容有：（ ）。", opts:["食物多样，谷类为主，粗细搭配","减少烹调油用量，吃清淡少盐膳食","食不过量，天天运动，保持健康体重","以上选项均正确"], ans:"D" },
        { text:"营养教育的主要内容之一是（ ）。", opts:["有计划对相关人员进行营养知识培训","开展广泛的群众性营养与健康宣教活动","将相关营养知识培训内容纳入初级卫生保健服务体系","以上选项均正确"], ans:"D" },
        { text:"评价食品卫生质量常用的细菌污染指标有（ ）。", opts:["致病菌总数","菌落总数","大肠粪群数","以上都对"], ans:"D" },
        { text:"关于食品安全的说法正确的是（ ）。", opts:["食品污染指食品被外来的但对人体健康无害的物质所污染","为了食品安全，需要定期监测食品污染","食品污染是可避免的","常见的农药中毒是通过食物链和生物富集的作用污染食物所引起"], ans:"B" },
        { text:"关于建立个人健康与营养档案的4个程序，下面不正确的选项是（ ）。", opts:["通过现存的健康资料、日常工作记录、系统的社区调查、广泛的健康筛选等收集健康与营养数据","对营养资料档案的所有内容、数据进行仔细核查和录入，建立可靠准确的信息数据库","将资料编号、归类、分档、固定放置，指定专人管理健康与营养资料","复印保存健康与营养档案纸类资料，电子文档要定期更新数据"], ans:"D" },
        { text:"下面不是社区个人健康档案和营养档案体现的主体框架的选项是（ ）。", opts:["个人健康档案和营养档案的主体框架是以问题为导向的记录（POMR）","POMR主要内容包括：个人基础资料、问题目录、问题描述、病程流程表","具有收集资料全面、完整、便于统计和保护居民隐私等优点","不仅用于个人健康档案、也用于家庭健康档案"], ans:"C" },
        { text:"关于社区营养干预项目计划的要求，不正确的选项是（", opts:["有针对性的项目计划应符合目标人群的特点，具有较强的针对性","成本较低的经费开支优先选用既花钱少又效益高措施","可行性的计划顺利开展取决于活动所涉及的资源、技术、经费、时间、社区的参与性等是否能符合或满足要求","易于评价的活动计划由参与者根据个人感受评价项目目标"], ans:"D" },
        { text:"关于收集社区定量资料的方法，下面不正确的选项是（", opts:["收集定量资料，获得人群发生某种事件的数量指标的研究方法称为半定量研究","收集方式有现场调查、信函调查和电话调查，信函和电话调查覆盖面较广，但回收率较低","面对面调查具有形式比较灵活、对调查对象文化程度要求不高、问卷回收率较高、准确性比较高等特点","社区健康促进活动是群众自发的活动"], ans:"D" },

    // 构建完整题库（只取单选题，避免多选判断增加复杂度，但保证120题全）
    const allQuestions = singleList.map((item, idx) => ({

        options: item.opts,
        answer: item.ans
    }));

    let currentMode = 'practice'; // practice, recite, wrongOnly
    let currentIndex = 0;
    let wrongIds = new Set();       // 存储错题索引
    let lastResult = null;         // 存储最后一次作答结果 { correct, correctAnswer }

    // 根据模式获取当前题目列表
    function getCurrentQuestions() {
        if (currentMode === 'wrongOnly') {
            const wrongList = allQuestions.filter(q => wrongIds.has(q.id));
            if (wrongList.length === 0) return allQuestions; // 若错题本为空，自动显示全部
            return wrongList;
        }
        return allQuestions;
    }

    let currentQuestions = getCurrentQuestions();

    // 保存进度
    function saveProgress() {
        localStorage.setItem('lastIndex', currentIndex);
        localStorage.setItem('lastMode', currentMode);
        localStorage.setItem('wrongIds', JSON.stringify([...wrongIds]));
    }

    function loadProgress() {
        const savedIndex = localStorage.getItem('lastIndex');
        const savedMode = localStorage.getItem('lastMode');
        const savedWrong = localStorage.getItem('wrongIds');
        if (savedIndex !== null) currentIndex = parseInt(savedIndex);
        if (savedMode !== null && (savedMode === 'practice' || savedMode === 'recite' || savedMode === 'wrongOnly')) {
            currentMode = savedMode;
        }
        if (savedWrong !== null) {
            try {
                const arr = JSON.parse(savedWrong);
                wrongIds = new Set(arr);
            } catch(e) {}
        }
        // 重新计算当前题目列表，并修正索引
        currentQuestions = getCurrentQuestions();
        if (currentIndex >= currentQuestions.length) currentIndex = Math.max(0, currentQuestions.length - 1);
        if (currentIndex < 0 && currentQuestions.length > 0) currentIndex = 0;
    }

    // 错题操作
    function addWrong(id) { wrongIds.add(id); saveProgress(); }
    function removeWrong(id) { wrongIds.delete(id); saveProgress(); }

    // 核对答案
    function checkAnswer(selected, q) {
        let isCorrect = (selected === q.answer);
        let correctAnswer = q.answer;
        if (!isCorrect) addWrong(q.id);
        else if (wrongIds.has(q.id)) removeWrong(q.id);
        return { correct: isCorrect, correctAnswer: correctAnswer };
    }

                <button class="mode-btn wrong-btn ${currentMode === 'wrongOnly' ? 'active' : ''}" data-mode="wrongOnly">📘 错题本</button>
            </div>
            <div class="counter">${currentIndex+1} / ${total}</div>
        </div>
        <div class="card">
            <div class="q-type">单选题</div>
            <div class="q-text">${escapeHtml(q.text)}</div>
            <div class="options" id="optionsContainer"></div>`;

        if (lastResult && !isRecite) {
            const cls = lastResult.correct ? 'correct' : 'wrong';
            const icon = lastResult.correct ? '✅' : '❌';
            html += `<div class="feedback ${cls}">${icon} ${lastResult.correct ? '回答正确！' : '回答错误！'} 正确答案：${lastResult.correctAnswer}</div>`;
        } else if (isRecite) {
            html += `<div class="feedback correct">📖 背题模式 · 正确答案：${q.answer}</div>`;
        }

        html += `<div class="nav">
            <button class="nav-btn" id="prevBtn">◀ 上一题</button>
            <button class="nav-btn" id="nextBtn">下一题 ▶</button>
        </div>`;

        if (!isRecite) {
            html += `<button class="check-btn" id="checkBtn">✓ 核对答案</button>`;
        }
        html += `<div class="small">滑动切换题目 · 错题自动记录</div></div>`;
        root.innerHTML = html;

        // 渲染选项
        const optsDiv = document.getElementById('optionsContainer');
        if (optsDiv) {
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, idx) => {
                const letter = letters[idx];
                optsDiv.innerHTML += `<label class="opt">
                    <input type="radio" name="question" value="${letter}">
                    <span class="opt-prefix">${letter}.</span>
                    <span>${escapeHtml(opt)}</span>
                </label>`;
            });
        }

        document.getElementById('prevBtn')?.addEventListener('click', () => {

            render();
        });
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (currentIndex + 1 < currentQuestions.length) currentIndex++;
            else { alert('已是最后一题'); return; }
            lastResult = null;
            saveProgress();
            render();
        });
        if (!isRecite) {
            document.getElementById('checkBtn')?.addEventListener('click', () => {
                const selectedRadio = document.querySelector('input[name="question"]:checked');
                if (!selectedRadio) {
                    alert('请选择一个选项');
                    return;
                }
                const selectedValue = selectedRadio.value;
                const result = checkAnswer(selectedValue, q);
                lastResult = result;
                render();
            });
        }

        // 模式切换按钮
        document.querySelectorAll('[data-mode]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const mode = e.currentTarget.getAttribute('data-mode');
                if (mode === 'wrongOnly') {
                    const wrongCount = allQuestions.filter(qq => wrongIds.has(qq.id)).length;
                    if (wrongCount === 0 && mode === 'wrongOnly') {
                        alert('错题本暂无题目，请先在刷题模式下积累错题');
                        return;
                    }
                }
                currentMode = mode;
                currentQuestions = getCurrentQuestions();
                if (currentIndex >= currentQuestions.length) currentIndex = Math.max(0, currentQuestions.length - 1);
                if (currentIndex < 0 && currentQuestions.length) currentIndex = 0;
                lastResult = null;
                saveProgress();
                render();
            });
        });
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 启动
    loadProgress();
    // 确保当前题目列表与模式一致
    currentQuestions = getCurrentQuestions();
    if (currentIndex >= currentQuestions.length) currentIndex = Math.max(0, currentQuestions.length - 1);
    render();
</script>
</body>
</html>
