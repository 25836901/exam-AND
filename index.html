<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>公共营养师三级题库 | 完整原题版</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            background: #eef2f7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            max-width: 950px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .mode-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: #fff;
            padding: 12px 20px;
            border-bottom: 1px solid #e2edf2;
            gap: 12px;
        }
        .mode-buttons { display: flex; gap: 10px; }
        .mode-btn {
            border: none;
            background: #f0f4f9;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            color: #1e2a3e;
        }
        .mode-btn.active { background: #2c5f8a; color: white; }
        .wrongonly-btn { background: #ffe4e2; color: #b91c1c; }
        .wrongonly-btn.active { background: #b91c1c; color: white; }
        .progress-info {
            background: #e9f0f5;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .quiz-card { padding: 28px 24px 32px; }
        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .q-type {
            background: #dfe9f3;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 12px 0 20px;
            color: #0a2540;
        }
        .options-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fafcff;
            padding: 10px 16px;
            border-radius: 18px;
            border: 1px solid #e2edf2;
            cursor: pointer;
        }
        .option-prefix { font-weight: 700; min-width: 28px; color: #2c5f8a; }
        .feedback-area {
            margin: 20px 0;
            padding: 14px 18px;
            border-radius: 20px;
            border-left: 5px solid;
        }
        .feedback-correct { background: #e0f2e9; border-left-color: #2b7a4b; color: #14532d; }
        .feedback-wrong { background: #fee9e7; border-left-color: #b91c1c; color: #a10f0f; }
        .nav-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .nav-btn {
            flex: 1;
            background: white;
            border: 1px solid #cbdde9;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .check-btn {
            width: 100%;
            background: #2c5f8a;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 15px;
            cursor: pointer;
        }
        .small-note { text-align: center; font-size: 0.7rem; color: #7c8ea0; margin-top: 20px; }
        @media (max-width: 550px) {
            .quiz-card { padding: 20px 16px; }
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div id="appRoot" class="app-container"></div>

<script>
    // ---------- 完整题库：1-120题，全部原题选项及正确答案 ----------

        { text:"下列选项中，关于职业道德与人的事业成功的关系的正确论述是（ ）。", opts:["职业道德是事业成功的重要条件","职业道德水平高的人肯定能够取得事业的成功","缺乏职业道德的人也会获得事业的成功","人的事业成功与否与职业道德无关"], ans:"A" },

        { text:"关于创新的论述，不正确的说法是（", opts:["创新需要“标新立异”","服务也需要创新","创新是企业进步的灵魂","引进别人的新技术不算创新"], ans:"A" },

        { text:"下列选项中，冬虫夏草的主要作用不包括（", opts:["调节免疫功能","抗肿瘤作用","改善心肌缺血与心律失常，降低血压","兴奋中枢神经系统"], ans:"D" },

        { text:"某一食物蛋白质与鸡蛋比较，精氨酸含量最低，其次是苏氨酸，缬氨酸高于鸡蛋白，赖氨酸及其他氨基酸与鸡蛋白相近，则该食物蛋白的限制氨基酸为（ ）。", opts:["精氨酸","苏氨酸","赖氨酸","缬氨酸"], ans:"A" },
        { text:"描述脂类生理功能不正确的是（", opts:["维持人体正常的生理和发育所必需的物质","构成人体细胞的重要成分","促进脂溶性维生素吸收和利用","人体唯一能量来源"], ans:"D" },

        { text:"描述烹调加工过程对畜、禽、鱼类食品营养成分变化不正确的是（ ）。", opts:["烹调后蛋白质量变化不大，更易消化吸收","高温制作过程中B族维生素损失较多","炖、煮肉类时无机盐和脂溶性维生素损失不大","烧烤食物味道鲜美，营养价值增加"], ans:"D" },
        { text:"有关发酵酸奶的营养特点不正确的选项是（", opts:["乳酸菌繁殖提高维生素B12和叶酸的含量","
